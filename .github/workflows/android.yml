name: Android APK
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - run: gradle :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: dj-simulator-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
